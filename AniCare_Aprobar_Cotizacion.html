<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#EEF4F0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:22px;max-width:520px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.1);overflow:hidden}
.header{background:linear-gradient(135deg,#40916C,#52B788);padding:26px 28px;text-align:center}
.header h1{color:white;font-size:19px;font-weight:900}

@keyframes spin{to{transform:rotate(360deg)}}

.q-num{font-size:14px;font-weight:800;color:#40916C;background:#F0FAF4;border-radius:9px;padding:7px 14px;display:inline-block;margin-bottom:16px}

.totals{background:#F0FAF4;border-radius:13px;padding:16px 18px;margin-top:18px}

.btn-aprobar{background:linear-gradient(135deg,#40916C,#52B788);color:white;border:none;border-radius:13px;padding:17px;font-size:17px;font-weight:700;cursor:pointer}

.cal-leyenda span{display:inline-flex;align-items:center;gap:6px}
.cal-dot{width:11px;height:11px;border-radius:50%;display:inline-block}

.hora-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.hora-slot{border-radius:11px;padding:13px 4px;text-align:center;border:1.5px solid #95D5B2;background:#F0FAF4;color:#1B4332;font-weight:700;font-size:14.5px;font-family:inherit;cursor:pointer;transition:transform .12s,border-color .12s}

.dato-title{font-size:18px;font-weight:800;color:#1B4332;margin-bottom:7px;text-align:center}

.retry-box{text-align:center;padding:30px 20px;color:#78350F;background:#FFF8E1;border:1.5px solid #F0B75A;border-radius:14px;font-size:14.5px;line-height:1.6}
.btn-reintentar{width:100%;background:linear-gradient(135deg,#40916C,#52B788);color:white;border:none;border-radius:12px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:16px}
.btn-whatsapp{display:block;width:100%;text-align:center;text-decoration:none;background:none;border:1.5px solid #40916C;color:#2D6A4F;border-radius:12px;padding:11px;font-size:13.5px;font-weight:700;margin-top:9px;box-sizing:border-box}

<script>
var SUPA_URL='https://tsajcvsgnxxnmhubrxmr.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYWpjdnNnbnh4bm1odWJyeG1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Njg5MzksImV4cCI6MjA5ODM0NDkzOX0.wArWbLtcrwgKHvq2vdDqycqOGcti8-kaFngzw9XTX2M';
var sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
var TOKEN = new URLSearchParams(window.location.search).get('t');
var quoteData = null;

function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function cargar(){
  var body = document.getElementById('bodyContent');
  if(!TOKEN){
    body.innerHTML = '<div class="error-box">⚠️ Enlace inválido.<br>Falta el código de la cotización.</div>';
    return;
  }
  try{
    var {data, error} = await sb.rpc('obtener_cotizacion_publica', {p_token: TOKEN});
    if(error) throw error;
    if(!data || data.length===0){
      body.innerHTML = '<div class="error-box">⚠️ No encontramos esta cotización.<br>El enlace puede haber expirado o ser incorrecto.</div>';
      return;
    }
    quoteData = data[0];

    if(quoteData.estado !== 'cotizado'){
      var estadoTxt = {aprobada:'✅ Ya aprobaste esta cotización anteriormente. ¡Gracias!',
                       pagada:'💰 Esta cotización ya fue pagada. ¡Gracias por confiar en AniCare!',
                       cancelada:'❌ Esta cotización ya fue cancelada.',
                       pendiente:'⏳ Esta cotización aún no tiene precio asignado.'}[quoteData.estado] || 'Esta cotización ya fue procesada.';
      body.innerHTML = '<div class="error-box">'+estadoTxt+'</div>';
      return;
    }

    renderQuote();
  } catch(e){
    body.innerHTML = '<div class="error-box">⚠️ Error al cargar la cotización.<br>Intenta de nuevo o contáctanos por WhatsApp.</div>';
    console.error(e);
  }
}

// Nombres de servicio para el formato nuevo (array de objetos). Deben coincidir
// con las claves 'svc' que usa el formulario público y la Edge Function de precios.
var TIPOS_NOMBRE = {
  hogar:'Limpieza Hogar / Comercial', comercial:'Limpieza Comercial',
  alfombras:'Alfombras o Moquetas', colchones:'Colchones',
  persianas:'Persianas y Cortinas', pisos:'Pisos y Superficies',
  pulido:'Pulido de Pisos', sofas:'Sofás y Muebles', electro:'Servicios Adicionales de Limpieza'
};

// Arma la línea descriptiva de un ítem (formato nuevo) a partir de los campos que
// tenga presentes — mismo criterio que usa Panel Admin para mostrar cada ítem.
// BUG CORREGIDO (19-jul-2026): faltaban ubicación y color/tela — Correo 1
// sí los mostraba (vienen del formulario), pero este descItem() (usado en el
// Correo 3) los omitía para cotizaciones en formato de objeto estructurado,
// dejando el detalle más pobre que en los otros correos. Se agregan para que
// el nivel de detalle sea el mismo en los 4 correos.
function descItem(it){
  var partes=[];
  if(it.tipo) partes.push(it.tipo);
  if(it.clasificacion) partes.push(it.clasificacion);
  if(it.forma && it.forma!=='—') partes.push(it.forma);
  if(it.tammod) partes.push(it.tammod);
  if(it.puestos) partes.push(it.puestos);
  if(it.sup) partes.push(it.sup);
  if(it.medidas) partes.push(it.medidas);
  if(it.area) partes.push(it.area+' m²');
  if(it.cant && parseInt(it.cant,10)>1) partes.push('x'+it.cant);
  if(it.ubicacion) partes.push('📍 '+it.ubicacion);
  if(it.telColor) partes.push('🎨 '+it.telColor);
  if(it.motivos && it.motivos.length) partes.push(it.motivos.join(', '));
  return partes.join(' · ');
}

function renderQuote(){
  var q = quoteData;
  var h = '<div class="q-num">N° '+esc(q.numero_cot)+'</div>';
  h += '<div class="q-client">Hola, '+esc(q.cliente_nombre)+' 👋</div>';

  var servicios = q.servicios || [];
  var esFormatoObjeto = servicios.length>0 && typeof servicios[0]==='object';

  if(esFormatoObjeto){
    var grupos={}, orden=[];
    servicios.forEach(function(it){
      var key=(it.svc||'otros');
      var nombre=TIPOS_NOMBRE[key]||key;
      if(!grupos[nombre]){ grupos[nombre]=[]; orden.push(nombre); }
      grupos[nombre].push(it);
    });
    orden.forEach(function(nombre){
      h += '<div class="svc-block"><div class="svc-name">'+esc(nombre)+'</div>';
      grupos[nombre].forEach(function(it){
        h += '<div class="svc-item">• '+esc(descItem(it))+'</div>';
      });
      h += '</div>';
    });
  } else {
    // Formato antiguo (texto) — se mantiene por compatibilidad con cotizaciones viejas
    for(var i=0;i<servicios.length;i++){
      var lines = (servicios[i]||'').split('\n');
      var svcName = lines[0].replace(':','');
      h += '<div class="svc-block"><div class="svc-name">'+esc(svcName)+'</div>';
      for(var li=1;li<lines.length;li++){
        if(!lines[li].trim()) continue;
        h += '<div class="svc-item">• '+esc(lines[li].replace(/^\s*\d+\.\s*/,''))+'</div>';
      }
      h += '</div>';
    }
  }

  h += '<div class="totals">';
  h += '<div class="t-row"><span>Subtotal</span><span>$'+(q.subtotal||0).toFixed(2)+'</span></div>';
  if(q.descuento>0) h += '<div class="t-row"><span>Descuento</span><span>-$'+q.descuento.toFixed(2)+'</span></div>';
  h += '<div class="t-row"><span>ITBMS (7%)</span><span>$'+(q.itbms||0).toFixed(2)+'</span></div>';
  h += '<div class="t-row final"><span>TOTAL</span><span>$'+(q.total||0).toFixed(2)+'</span></div>';
  h += '</div>';

  h += '<div class="btns">';
  h += '<button class="btn-aprobar" onclick="aprobar()">✅ Aprobar Cotización</button>';
  h += '<button class="btn-cancelar" onclick="mostrarMotivo()">❌ No, gracias</button>';
  h += '</div>';

  h += '<div class="motivo-box" id="motivoBox">';
  h += '<select id="motivoSelect" onchange="toggleMotivoOtro()">';
  h += '<option value="">— ¿Por qué no continuarás? —</option>';
  h += '<option value="Ya no necesito el servicio">Ya no necesito el servicio</option>';
  h += '<option value="Elegí otro proveedor">Elegí otro proveedor</option>';
  h += '<option value="El precio no se ajusta a mi presupuesto">El precio no se ajusta a mi presupuesto</option>';
  h += '<option value="Prefiero reprogramar más adelante">Prefiero reprogramar más adelante</option>';
  h += '<option value="Otro">Otro</option>';
  h += '</select>';
  h += '<textarea id="motivoOtro" placeholder="Cuéntanos brevemente..."></textarea>';
  h += '<button class="btn-confirmar-cancel" onclick="confirmarCancelar()">Confirmar</button>';
  h += '</div>';

  h += '<div class="footer-note">Cleaning Service & Ani Care · Panamá<br>WhatsApp: +507 6317-1227</div>';

  document.getElementById('bodyContent').innerHTML = h;
}

function mostrarMotivo(){
  document.getElementById('motivoBox').style.display='block';
}
function toggleMotivoOtro(){
  var sel = document.getElementById('motivoSelect').value;
  document.getElementById('motivoOtro').style.display = sel==='Otro' ? 'block' : 'none';
}

async function notificarPorEmail(decision, motivo){
  try{
    await fetch(SUPA_URL+'/functions/v1/enviar-email', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer '+SUPA_KEY
      },
      body: JSON.stringify({
        tipo:'cliente_respondio',
        numCot:quoteData.numero_cot,
        accion:decision==='aprobada'?'aprobar':'cancelar',
        motivo:motivo||null,
        cliente:{
          nombre:quoteData.cliente_nombre,
          telefono:quoteData.cliente_telefono||''
        }
      })
    });
  } catch(e){ console.warn('No se pudo notificar por email:', e); }
}

// Arma el resumen de servicios en texto plano (mismo criterio que renderQuote/
// descItem) para incluirlo en el cuerpo del Correo 3 y en el adjunto .ics.
function construirResumenServiciosTexto(){
  var q = quoteData;
  var servicios = q.servicios || [];
  var esFormatoObjeto = servicios.length>0 && typeof servicios[0]==='object';
  var lineas = [];
  if(esFormatoObjeto){
    var grupos={}, orden=[];
    servicios.forEach(function(it){
      var key=(it.svc||'otros');
      var nombre=TIPOS_NOMBRE[key]||key;
      if(!grupos[nombre]){ grupos[nombre]=[]; orden.push(nombre); }
      grupos[nombre].push(it);
    });
    orden.forEach(function(nombre){
      lineas.push(nombre+':');
      grupos[nombre].forEach(function(it){ lineas.push('  • '+descItem(it)); });
    });
  } else {
    for(var i=0;i<servicios.length;i++){
      var ls = (servicios[i]||'').split('\n');
      lineas.push(ls[0].replace(':','')+':');
      for(var li=1;li<ls.length;li++){ if(ls[li].trim()) lineas.push('  • '+ls[li].replace(/^\s*\d+\.\s*/,'')); }
    }
  }
  lineas.push('');
  lineas.push('Subtotal: $'+(q.subtotal||0).toFixed(2));
  if(q.descuento>0) lineas.push('Descuento: -$'+q.descuento.toFixed(2));
  lineas.push('ITBMS (7%): $'+(q.itbms||0).toFixed(2));
  lineas.push('TOTAL: $'+(q.total||0).toFixed(2));
  return lineas.join('\n');
}

// Correo 3 (nuevo) — confirmación al CLIENTE de que su servicio quedó
// aprobado, con la fecha destacada y un botón para agendarlo en su calendario.
// Se envía además de notificarPorEmail() (que solo avisa a Ani por dentro).
async function enviarCorreoAprobacionCliente(){
  if(!quoteData || !quoteData.cliente_email) return; // sin correo no hay a quién enviarle
  try{
    await fetch(SUPA_URL+'/functions/v1/enviar-email', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer '+SUPA_KEY
      },
      body: JSON.stringify({
        tipo:'cotizacion_aprobada_cliente',
        numCot:quoteData.numero_cot,
        cliente:{
          nombre:quoteData.cliente_nombre,
          email:quoteData.cliente_email,
          direccion:quoteData.cliente_direccion||''
        },
        servicios:construirResumenServiciosTexto(),
        fecha:quoteData.fecha_servicio||'',
        hora:quoteData.hora_servicio||'',
        duracionMin:quoteData.duracion_estimada_min||null
      })
    });
  } catch(e){ console.warn('No se pudo enviar el correo de confirmación al cliente:', e); }
}

async function aprobar(){
  var body = document.getElementById('bodyContent');
  body.innerHTML = '<div class="loading"><div class="spinner"></div>Procesando...</div>';
  try{
    var {data, error} = await sb.rpc('responder_cotizacion', {p_token:TOKEN, p_decision:'aprobada', p_motivo:null});
    if(error) throw error;
    if(!data){
      body.innerHTML = '<div class="error-box">⚠️ No se pudo procesar. Es posible que ya hayas respondido antes.</div>';
      return;
    }
    notificarPorEmail('aprobada', null); // aviso interno a Ani (ya existía)
    quoteData.estado='aprobada';
    verificarDatosObligatorios(); // AJUSTE (22-jul-2026, a pedido de Ani): antes de seguir a la
    // selección de fecha/hora, se verifica que estén completos los datos
    // necesarios para el servicio (dirección, nombre, teléfono) — si falta
    // algo, se le pide al cliente que lo complete aquí mismo antes de continuar.
  } catch(e){
    body.innerHTML = '<div class="error-box">⚠️ Error al procesar. Intenta de nuevo o contáctanos por WhatsApp.</div>';
    console.error(e);
  }
}

// ===================== VERIFICACIÓN DE DATOS OBLIGATORIOS =====================
// Punto 2 (pedido de Ani, 22-jul-2026): al aprobar, es obligatorio que la
// cotización tenga fecha, dirección, datos del cliente y detalle de la orden.
// El detalle de la orden y (normalmente) nombre/teléfono/email ya son
// obligatorios desde el formulario público de solicitud — el único campo que
// históricamente se dejaba opcional ahí es la Dirección, así que es el caso
// real que se cubre aquí, pero se revisan los 4 por seguridad.
function verificarDatosObligatorios(){
  var q = quoteData;
  var faltantes = [];
  if(!q.cliente_direccion || !String(q.cliente_direccion).trim()) faltantes.push({campo:'cliente_direccion', label:'Dirección completa', placeholder:'Ej: Calle 50, Edificio Torre Azul, piso 4'});
  if(!q.cliente_nombre || !String(q.cliente_nombre).trim()) faltantes.push({campo:'cliente_nombre', label:'Nombre completo', placeholder:'Tu nombre completo'});
  if(!q.cliente_telefono || !String(q.cliente_telefono).trim()) faltantes.push({campo:'cliente_telefono', label:'Teléfono', placeholder:'6XXX-XXXX'});
  if(!q.servicios || !q.servicios.length) faltantes.push({campo:'servicios', label:'Detalle del servicio', placeholder:''});

  if(faltantes.length===0){
    mostrarSeleccionFecha();
    return;
  }
  // El detalle de servicios no se puede completar desde este formulario del
  // cliente — si eso llega a faltar, es un caso anómalo que requiere que Ani
  // lo revise directamente, no se le pide al cliente que lo invente.
  var faltaServicios = faltantes.some(function(f){ return f.campo==='servicios'; });
  if(faltaServicios){
    var body = document.getElementById('bodyContent');
    body.innerHTML = '<div class="error-box">⚠️ Tu cotización quedó aprobada, pero el detalle del servicio no se pudo cargar correctamente.<br><br>Por favor contáctanos por WhatsApp para coordinar tu servicio.<br><br><a class="btn-whatsapp" href="https://wa.me/50763171227" target="_blank">📱 Escribir por WhatsApp</a></div>';
    return;
  }
  mostrarFormularioDatosFaltantes(faltantes.filter(function(f){ return f.campo!=='servicios'; }));
}

function mostrarFormularioDatosFaltantes(faltantes){
  var body = document.getElementById('bodyContent');
  var h = '<div class="dato-title">📋 Un último paso</div>';
  h += '<div class="dato-sub">Para poder coordinar tu servicio necesitamos que completes estos datos.</div>';
  faltantes.forEach(function(f){
    h += '<div class="dato-campo">';
    h += '<label for="campo_'+f.campo+'">'+esc(f.label)+'</label>';
    h += '<input type="text" id="campo_'+f.campo+'" placeholder="'+esc(f.placeholder)+'">';
    h += '<div class="dato-error" id="err_'+f.campo+'">Este campo es obligatorio.</div>';
    h += '</div>';
  });
  h += '<button type="button" class="btn-guardar-dato" onclick="guardarDatosFaltantes(['+faltantes.map(function(f){return "'"+f.campo+"'";}).join(',')+'])">Continuar</button>';
  body.innerHTML = h;
}

async function guardarDatosFaltantes(campos){
  var valores = {};
  var valido = true;
  campos.forEach(function(campo){
    var input = document.getElementById('campo_'+campo);
    var val = (input.value||'').trim();
    var errEl = document.getElementById('err_'+campo);
    if(!val){
      errEl.style.display='block';
      valido = false;
    } else {
      errEl.style.display='none';
      valores[campo] = val;
    }
  });
  if(!valido) return;

  var body = document.getElementById('bodyContent');
  body.innerHTML = '<div class="loading"><div class="spinner"></div>Guardando tus datos...</div>';
  try{
    var {data, error} = await sb.rpc('actualizar_datos_cliente_cotizacion', {
      p_token: TOKEN,
      p_direccion: valores.cliente_direccion || null,
      p_nombre: valores.cliente_nombre || null,
      p_telefono: valores.cliente_telefono || null
    });
    if(error) throw error;
    Object.keys(valores).forEach(function(campo){ quoteData[campo] = valores[campo]; });
    mostrarSeleccionFecha();
  } catch(e){
    console.error('Error guardando datos del cliente:', e);
    mostrarErrorConReintento('No se pudieron guardar tus datos. Por favor intenta de nuevo.', function(){ mostrarFormularioDatosFaltantes(campos.map(function(c){ return {campo:c, label:c, placeholder:''}; })); });
  }
}

// Pantalla genérica de error con botón de reintentar — reemplaza los antiguos
// "caminos de respaldo" que dejaban seguir el flujo SIN fecha u hora
// confirmada. Ahora, si algo falla, se le pide al cliente reintentar (o
// escribir por WhatsApp), pero nunca se completa la aprobación sin fecha y
// hora reales. (Punto 1, pedido de Ani, 22-jul-2026)
function mostrarErrorConReintento(mensaje, funcionReintento){
  window._reintentoActual = funcionReintento;
  var body = document.getElementById('bodyContent');
  body.innerHTML = '<div class="retry-box">⚠️ '+esc(mensaje)+
    '<button type="button" class="btn-reintentar" onclick="window._reintentoActual && window._reintentoActual()">🔄 Reintentar</button>'+
    '<a class="btn-whatsapp" href="https://wa.me/50763171227" target="_blank">📱 Prefiero coordinar por WhatsApp</a>'+
    '</div>';
}

// ===================== PANTALLA DE CONFIRMACIÓN DE HORA =====================
// Se muestra justo después de aprobar y antes del Correo 3. Busca los próximos
// 3 días con capacidad real (usando la duración estimada que Panel Admin ya
// calculó y guardó al cotizar, más las reglas de config_calendarizacion, que
// son de lectura pública igual que el resto de esta página) y deja que el
// cliente elija — recién ahí se dispara el Correo 3, ya con fecha confirmada.
var CONFIG_CAL_PUBLICO=null;

async function mostrarSeleccionFecha(){
  var body = document.getElementById('bodyContent');
  body.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando fechas disponibles...</div>';
  try{
    var duracionMin = quoteData.duracion_estimada_min || 120; // respaldo razonable si es una cotización antigua sin este dato

    if(!CONFIG_CAL_PUBLICO){
      var {data:cfg, error:eCfg} = await sb.from('config_calendarizacion').select('*').eq('id',1).single();
      if(eCfg) throw eCfg;
      CONFIG_CAL_PUBLICO = cfg;
    }

    var hoy = new Date();
    var desde = new Date(hoy); desde.setDate(desde.getDate()+1); // desde mañana
    var DIAS_VENTANA = 15; // calendario tipo aerolínea: 15 días para elegir
    var hasta = new Date(desde); hasta.setDate(hasta.getDate()+DIAS_VENTANA-1);
    var fmtISO = function(d){ return d.toISOString().slice(0,10); };

    var {data:reservas, error:eRes} = await sb.rpc('obtener_disponibilidad_publica', {p_desde:fmtISO(desde), p_hasta:fmtISO(hasta)});
    if(eRes) throw eRes;
    var reservasPorFecha = {};
    (reservas||[]).forEach(function(r){ reservasPorFecha[r.fecha] = r; });

    // A diferencia de antes (que buscaba los primeros 3 días libres y se
    // detenía ahí), ahora se evalúan los 15 días de la ventana completa —
    // los ocupados/cerrados también se muestran, solo que en gris y sin poder
    // seleccionarlos, como en un calendario de vuelos.
    var dias = [];
    var cursor = new Date(desde);
    var hayAlgunoLibre = false;
    for(var i=0;i<DIAS_VENTANA;i++){
      var fechaISO = fmtISO(cursor);
      var diaSemana = cursor.getDay(); // 0=domingo … 6=sábado
      var cfg = CONFIG_CAL_PUBLICO;
      var estado = 'libre';

      if(diaSemana===0 && cfg.domingo_cerrado){
        estado = 'ocupado';
      } else {
        var horaIni = diaSemana===6 ? cfg.sab_inicio : cfg.lunvie_inicio;
        var horaFin = diaSemana===6 ? cfg.sab_fin : cfg.lunvie_fin;
        var minDisp = minutosEntreHoras(horaIni,horaFin);
        var reservaDia = reservasPorFecha[fechaISO] || {minutos_ocupados:0, cantidad_clientes:0};
        var minOcupados = Number(reservaDia.minutos_ocupados||0) + (reservaDia.cantidad_clientes>0 ? cfg.margen_traslado_min : 0);
        var minTotal = minOcupados + duracionMin;
        if(reservaDia.cantidad_clientes>=cfg.max_clientes_dia || minTotal>minDisp){
          estado = 'ocupado';
        } else {
          var ocupacionPct = minDisp>0 ? Math.round((minTotal/minDisp)*100) : 100;
          estado = ocupacionPct>=cfg.alerta_ocupacion_min_pct ? 'alerta' : 'libre';
        }
      }
      if(estado!=='ocupado') hayAlgunoLibre = true;
      dias.push({fecha:fechaISO, dateObj:new Date(cursor), estado:estado});
      cursor.setDate(cursor.getDate()+1);
    }

    if(!hayAlgunoLibre){
      // AJUSTE (22-jul-2026, Punto 1): ya no se permite continuar sin fecha
      // confirmada. Si no hay ni un día libre en las 2 semanas, se avisa
      // claramente y se ofrece reintentar o coordinar por WhatsApp — pero la
      // aprobación no se da por completa hasta que haya fecha y hora reales.
      mostrarErrorConReintento('En este momento no encontramos días disponibles en las próximas 2 semanas. Por favor reintenta en unos minutos, o coordina directamente con nosotros.', mostrarSeleccionFecha);
      return;
    }

    renderSeleccionFecha(dias);
  } catch(e){
    console.error('Error buscando disponibilidad:', e);
    // AJUSTE (22-jul-2026, Punto 1): ya no se sigue el flujo sin fecha si algo
    // falla — se pide reintentar en vez de dejar la orden sin fecha/hora.
    mostrarErrorConReintento('No se pudieron cargar las fechas disponibles. Por favor reintenta.', mostrarSeleccionFecha);
  }
}

function minutosEntreHoras(horaIni,horaFin){
  var a=String(horaIni).split(':').map(Number);
  var b=String(horaFin).split(':').map(Number);
  return (b[0]*60+(b[1]||0))-(a[0]*60+(a[1]||0));
}

// Calendario tipo aerolínea: cuadrícula de 15 días, cada uno coloreado según
// disponibilidad. Verde = día libre. Naranja = queda espacio pero ya comparte
// el día con otro cliente (alta demanda). Gris = ocupado/cerrado, no se puede
// seleccionar (el botón queda deshabilitado, no solo pintado distinto).
function renderSeleccionFecha(dias){
  var body = document.getElementById('bodyContent');
  var h = '<div class="fecha-title">📅 Elige el día de tu servicio</div>';
  h += '<div class="fecha-sub">Estas son las próximas fechas para tu cotización N° '+esc(quoteData.numero_cot)+'. Toca un día disponible para confirmar tu servicio.</div>';

  h += '<div class="cal-grid">';
  dias.forEach(function(d){
    var dow = d.dateObj.toLocaleDateString('es-PA',{weekday:'short'}).replace('.','');
    var num = d.dateObj.getDate();
    var mes = d.dateObj.toLocaleDateString('es-PA',{month:'short'}).replace('.','');
    if(d.estado==='ocupado'){
      h += '<button type="button" class="cal-day ocupado" disabled title="No disponible">';
    } else {
      h += '<button type="button" class="cal-day '+d.estado+'" onclick="elegirFecha(\''+d.fecha+'\')" title="'+(d.estado==='alerta'?'Disponible — comparte el día con otro servicio':'Disponible')+'">';
    }
    h += '<div class="dow">'+dow+'</div>';
    h += '<div class="num">'+num+'</div>';
    h += '<div class="mes">'+mes+'</div>';
    h += '</button>';
  });
  h += '</div>';

  h += '<div class="cal-leyenda">';
  h += '<span><span class="cal-dot" style="background:#95D5B2"></span>Día libre</span>';
  h += '<span><span class="cal-dot" style="background:#F0B75A"></span>Cupo compartido</span>';
  h += '<span><span class="cal-dot" style="background:#CBD3DB"></span>No disponible</span>';
  h += '</div>';

  body.innerHTML = h;
}

// Crea el evento en el Google Calendar de AniCare (una sola vía: la app crea
// el evento, nunca lee el calendario). Si falla, no bloquea al cliente — el
// Correo 3 y la confirmación siguen su curso igual.
async function crearEventoCalendar(){
  if(!quoteData || !quoteData.fecha_servicio) return;
  try{
    await fetch(SUPA_URL+'/functions/v1/crear-evento-calendar', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer '+SUPA_KEY
      },
      body: JSON.stringify({
        numCot:quoteData.numero_cot,
        cliente:{
          nombre:quoteData.cliente_nombre,
          direccion:quoteData.cliente_direccion||'',
          telefono:quoteData.cliente_telefono||''
        },
        fecha:quoteData.fecha_servicio,
        hora:quoteData.hora_servicio||null,
        duracionMin:quoteData.duracion_estimada_min||null,
        servicios:construirResumenServiciosTexto(),
        total:(quoteData.total||0).toFixed(2)
      })
    });
  } catch(e){ console.warn('No se pudo crear el evento en Google Calendar:', e); }
}

var DIAS_CACHE = null; // guarda los 15 días ya calculados, para poder "volver" sin recalcular

// Antes esta función confirmaba la fecha directo; ahora primero muestra las
// horas disponibles de ese día (cada 30 min, sin almuerzo 12:00-12:30, nada
// antes de 8:30am) y la confirmación real ocurre en elegirHora().
async function elegirFecha(fechaISO){
  var body = document.getElementById('bodyContent');
  body.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando horarios disponibles...</div>';
  try{
    var duracionMin = quoteData.duracion_estimada_min || 120;
    var cfg = CONFIG_CAL_PUBLICO;
    var diaSemana = new Date(fechaISO+'T00:00:00').getDay();
    var horaFinDia = diaSemana===6 ? cfg.sab_fin : cfg.lunvie_fin;
    var margen = cfg.margen_traslado_min || 0;

    var {data:ocupados, error:eOc} = await sb.rpc('obtener_horarios_ocupados_publica', {p_fecha:fechaISO});
    if(eOc) throw eOc;

    var slots = generarSlotsHora(fechaISO, horaFinDia, duracionMin, margen, ocupados||[]);
    renderSeleccionHora(fechaISO, slots);
  } catch(e){
    console.error('Error buscando horarios:', e);
    // AJUSTE (22-jul-2026, Punto 1): ya no se confirma solo la fecha sin hora
    // — se pide reintentar, para garantizar que siempre quede una hora real.
    mostrarErrorConReintento('No se pudieron cargar los horarios disponibles para ese día. Por favor reintenta.', function(){ elegirFecha(fechaISO); });
  }
}

// Genera franjas de 30 min desde 8:30am hasta que ya no quepa la duración
// estimada antes del cierre del día, bloqueando siempre 12:00-12:30 (almuerzo)
// y cualquier franja que se cruce con un servicio ya confirmado ese día.
function generarSlotsHora(fechaISO, horaFinDia, duracionMin, margen, ocupados){
  var slots = [];
  var finMin = minutosEntreHoras('00:00', horaFinDia);
  var inicioMin = minutosEntreHoras('00:00','08:30');
  var almuerzoIni = minutosEntreHoras('00:00','12:00');
  var almuerzoFin = minutosEntreHoras('00:00','12:30');

  var ocupadosMin = (ocupados||[]).map(function(o){
    var ini = minutosEntreHoras('00:00', o.hora_inicio);
    return {ini:ini-margen, fin:ini+(o.duracion_min||120)+margen};
  });

  for(var t=inicioMin; t+duracionMin<=finMin; t+=30){
    var cruzaAlmuerzo = t < almuerzoFin && (t+duracionMin) > almuerzoIni;
    var cruzaOcupado = ocupadosMin.some(function(o){ return t < o.fin && (t+duracionMin) > o.ini; });
    var libre = !cruzaAlmuerzo && !cruzaOcupado;
    var hh = Math.floor(t/60), mm = t%60;
    var hora24 = (hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
    slots.push({hora24:hora24, libre:libre});
  }
  return slots;
}

function formatearHora12(hora24){
  var p = hora24.split(':'); var h = parseInt(p[0],10), m = p[1];
  var ampm = h>=12 ? 'pm' : 'am';
  var h12 = h%12; if(h12===0) h12=12;
  return h12+':'+m+' '+ampm;
}

function renderSeleccionHora(fechaISO, slots){
  var body = document.getElementById('bodyContent');
  var fechaObj = new Date(fechaISO+'T00:00:00');
  var fechaTxt = fechaObj.toLocaleDateString('es-PA',{weekday:'long',day:'numeric',month:'long'});

  var h = '<div class="fecha-title">🕒 Elige la hora de tu servicio</div>';
  h += '<div class="fecha-sub">'+esc(fechaTxt)+' &middot; duración estimada '+Math.round((quoteData.duracion_estimada_min||120)/60*10)/10+'h</div>';

  h += '<div class="hora-grid">';
  slots.forEach(function(s){
    if(s.libre){
      h += '<button type="button" class="hora-slot" onclick="elegirHora(\''+fechaISO+'\',\''+s.hora24+'\')">'+formatearHora12(s.hora24)+'</button>';
    } else {
      h += '<button type="button" class="hora-slot ocupada" disabled>'+formatearHora12(s.hora24)+'</button>';
    }
  });
  h += '</div>';

  h += '<div class="hora-nota">Almuerzo bloqueado de 12:00 a 12:30 pm</div>';
  h += '<button type="button" class="btn-volver" onclick="mostrarSeleccionFecha()">← Elegir otro día</button>';

  body.innerHTML = h;
}

async function elegirHora(fechaISO, hora24){
  var body = document.getElementById('bodyContent');
  body.innerHTML = '<div class="loading"><div class="spinner"></div>Confirmando fecha y hora...</div>';
  try{
    var {data, error} = await sb.rpc('confirmar_fecha_hora_servicio', {p_token:TOKEN, p_fecha:fechaISO, p_hora:hora24});
    if(error) throw error;
    quoteData.fecha_servicio = fechaISO;
    quoteData.hora_servicio = hora24;
    enviarCorreoAprobacionCliente(); // Correo 3 — ahora sí con fecha y hora confirmadas
    crearEventoCalendar(); // Evento en Google Calendar de AniCare
    mostrarResultado(true);
  } catch(e){
    console.error('Error confirmando fecha y hora:', e);
    // AJUSTE (22-jul-2026, Punto 1): antes esto caía a "guardar solo la fecha,
    // sin hora" — eliminado. Ahora se obliga a reintentar la selección de hora,
    // nunca se completa la aprobación sin una hora real confirmada.
    mostrarErrorConReintento('No se pudo confirmar tu hora. Por favor reintenta.', function(){ elegirFecha(fechaISO); });
  }
}

async function confirmarCancelar(){

  if(!sel){ alert('Por favor selecciona un motivo.'); return; }
  var motivo = sel==='Otro' ? (document.getElementById('motivoOtro').value.trim()||'Otro') : sel;

  var body = document.getElementById('bodyContent');
  body.innerHTML = '<div class="loading"><div class="spinner"></div>Procesando...</div>';
  try{
    var {data, error} = await sb.rpc('responder_cotizacion', {p_token:TOKEN, p_decision:'cancelada', p_motivo:motivo});
    if(error) throw error;
    if(!data){
      body.innerHTML = '<div class="error-box">⚠️ No se pudo procesar. Es posible que ya hayas respondido antes.</div>';
      return;

  } catch(e){
    body.innerHTML = '<div class="error-box">⚠️ Error al procesar. Intenta de nuevo o contáctanos por WhatsApp.</div>';

}

  var body = document.getElementById('bodyContent');

      '<div class="result-msg">Hemos recibido tu aprobación para la cotización<br><span style="display:inline-block;margin:6px 0;font-size:19px;font-weight:900;color:#2563EB">N° '+esc(quoteData.numero_cot)+'</span>'+lineaHora+'<br>'+mensajePrincipal+'</div>'+
      '<div class="result-note">⏰ Cualquier cambio de fecha debe ser notificado con 24 horas de anticipación.</div>'+
      '<div class="footer-note">Cleaning Service & Ani Care · Panamá<br>WhatsApp: +507 6317-1227</div>'+
      '</div>';
  } else {
    body.innerHTML = '<div class="result-screen">'+
      '<div class="result-icon cancel">✕</div>'+
      '<div class="result-title">Entendido, gracias por avisarnos</div>'+
      '<div class="result-msg">Hemos registrado tu respuesta para la cotización N° '+esc(quoteData.numero_cot)+'.<br><br>Si cambias de opinión, contáctanos cuando gustes.</div>'+
      '<div class="footer-note">Cleaning Service & Ani Care · Panamá<br>WhatsApp: +507 6317-1227</div>'+
      '</div>';
  }
}
